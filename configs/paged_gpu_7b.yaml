# Same sweep shape as quant_gpu2 / paged_gpu, Qwen2.5-7B (stronger PagedAttention signal vs HF).
model_name: "Qwen/Qwen2.5-7B-Instruct"
device: "cuda"
dtype: "float16"

input_lengths: [512, 1024, 1536, 2048]
max_new_tokens: 128

num_trials: 3
warmup_trials: 1

batch_sizes: [1]

frameworks:
  - HuggingFace
  - vLLM

tensor_parallel_size: 1
vllm_dtype: "half"
vllm_gpu_memory_utilization: 0.9
trust_remote_code: true

output_csv: "results/raw/paged_qwen7b.csv"
