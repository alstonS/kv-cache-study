# vLLM PagedAttention + KV cache quantization benchmark.
# Requires CUDA + vLLM (see requirements-paged.txt).
# FP8 KV cache requires Hopper/Ada GPU (H100, RTX 4090+).
# Use kv_cache_dtypes: ["auto"] on older GPUs (A100, V100).

model_name: "Qwen/Qwen2.5-1.5B-Instruct"
device: "cuda"
dtype: "float16"

input_lengths: [256, 512, 1024, 2048]
max_new_tokens: 32

num_trials: 3
warmup_trials: 1

batch_sizes: [1]

# "auto"  = no KV quantization (baseline paged)
# "fp8"   = FP8 KV cache (PagedAttention + quantization)
kv_cache_dtypes:
  - "auto"
  - "fp8"

tensor_parallel_size: 1
vllm_dtype: "half"
vllm_gpu_memory_utilization: 0.9
trust_remote_code: true

output_csv: "results/raw/paged_quant.csv"
